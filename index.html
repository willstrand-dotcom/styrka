<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gym Buddy.</title>
<style>
  :root{
    --green:#059669;
    --green-dark:#047857;
    --green-deep:#064e3b;
    --mint:#baf3d2;
    --mint-soft:#dffbea;
    --blue:#2563eb;
    --blue-soft:#dbeafe;
    --paper:#122b2f;
    --panel:#18383a;
    --ink:#f4fbf7;
    --muted:#b8ccc5;
    --faint:#89a19a;
    --line:rgba(214,255,236,.16);
    --shadow:0 24px 72px rgba(0,0,0,.42);
    --shadow-soft:0 16px 42px rgba(0,0,0,.3);
    --serif:Georgia,"Times New Roman",serif;
    --mono:ui-monospace,"SF Mono",SFMono-Regular,Menlo,Consolas,"Liberation Mono",monospace;
  }

  *{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{
    margin:0;
    min-height:100vh;
    padding:0 0 112px;
    color:var(--ink);
    font-family:var(--serif);
    font-variant-numeric:tabular-nums;
    background:
      radial-gradient(900px 480px at 15% -10%, rgba(59,130,246,.22), transparent 60%),
      radial-gradient(900px 520px at 92% 3%, rgba(5,150,105,.26), transparent 58%),
      linear-gradient(180deg,#10262d 0%,#173b37 48%,#0d2428 100%);
    background-attachment:fixed;
  }

  button,input,select{font:inherit}
  button{border:0;background:transparent;color:inherit;cursor:pointer}
  .wrap{width:min(100% - 32px,760px);margin:0 auto}

  header{padding:34px 0 22px}
  .hrow{display:flex;align-items:center;justify-content:space-between;gap:16px}
  h1,h2,h3,p{margin:0}
  h1{font-size:clamp(40px,8vw,64px);font-weight:400;line-height:.95;letter-spacing:-1px}
  h1 .dot{color:var(--green)}
  header:after{content:"";display:block;height:1px;margin-top:22px;background:linear-gradient(90deg,rgba(186,243,210,.34),transparent)}

  .pill{
    display:none;
    flex:none;
    border:1px solid var(--line);
    border-radius:999px;
    padding:8px 12px;
    color:var(--muted);
    background:rgba(16,38,45,.78);
    font-family:var(--mono);
    font-size:11px;
    letter-spacing:.4px;
  }
  .pill.saved,.pill.saving,.pill.error{display:inline-block}
  .pill.saved{border-color:rgba(186,243,210,.28);background:rgba(223,251,234,.9);color:var(--green-deep)}

  .card{
    margin:0 0 18px;
    padding:24px;
    border:1px solid rgba(219,255,239,.14);
    border-radius:20px;
    background:rgba(20,49,52,.78);
    box-shadow:var(--shadow-soft);
    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);
  }
  .card.hero{
    padding:28px;
    background:
      linear-gradient(145deg,rgba(31,72,72,.9),rgba(13,52,43,.86) 62%),
      var(--panel);
    box-shadow:var(--shadow);
  }
  .card.blue{
    background:linear-gradient(145deg,rgba(25,57,71,.88),rgba(17,48,45,.84) 66%);
  }

  .eyebrow{
    display:flex;
    align-items:center;
    gap:10px;
    margin:0 0 14px;
    color:#88efbd;
    font-family:var(--mono);
    font-size:11px;
    letter-spacing:2.7px;
    text-transform:uppercase;
  }
  .eyebrow:before{content:"";width:18px;height:2px;border-radius:2px;background:var(--green)}
  h2{font-size:clamp(24px,5vw,32px);font-weight:400;letter-spacing:-.4px}
  h3{font-size:21px;font-weight:400;letter-spacing:-.2px}
  .mono{font-family:var(--mono)}
  .small{font-size:12.5px;line-height:1.55;color:var(--muted)}
  .faint{color:var(--faint)}

  .btn-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:22px 0}
  .btn{
    display:flex;
    min-height:48px;
    align-items:center;
    justify-content:center;
    border-radius:999px;
    padding:14px 16px;
    font-family:var(--mono);
    font-size:11px;
    letter-spacing:1.6px;
    text-transform:uppercase;
    transition:transform .16s ease,box-shadow .16s ease,background .16s ease,border-color .16s ease;
  }
  .btn:active{transform:translateY(1px)}
  .btn-primary{background:linear-gradient(145deg,var(--green),var(--green-dark));color:#fff;box-shadow:0 11px 26px rgba(5,150,105,.28)}
  .btn-primary:hover{transform:translateY(-1px);box-shadow:0 14px 34px rgba(5,150,105,.34)}
  .btn-outline{border:1px solid rgba(219,255,239,.2);background:rgba(244,251,247,.9);color:#14201e}
  .btn-outline:hover{border-color:rgba(186,243,210,.5);background:#fff}
  .btn-dark{background:var(--ink);color:#fff}

  .weektop{display:grid;grid-template-columns:1fr auto;align-items:end;gap:16px;margin-bottom:22px}
  .weeknum{display:block;font-size:clamp(58px,15vw,92px);line-height:.88;letter-spacing:-3px}
  .weeklabel{display:block;margin-top:8px;color:var(--muted);font-family:var(--mono);font-size:12px;letter-spacing:1.4px;text-transform:uppercase}
  .weekbadge{
    min-width:112px;
    border:1px solid rgba(5,89,70,.18);
    border-radius:16px;
    padding:14px;
    background:rgba(236,250,242,.94);
    color:#14201e;
    text-align:right;
  }
  .weekbadge b{display:block;font-size:28px;font-weight:400;line-height:1}
  .weekbadge span{display:block;margin-top:6px;color:#3e4b46;font-family:var(--mono);font-size:10px;letter-spacing:1.8px;text-transform:uppercase}

  .chart{display:flex;align-items:flex-end;gap:10px;height:158px;margin-top:8px;border-bottom:1px solid var(--line)}
  .col{flex:1;display:flex;height:100%;min-width:0;flex-direction:column;align-items:center;justify-content:flex-end}
  .val{min-height:14px;margin-bottom:6px;color:var(--faint);font-family:var(--mono);font-size:10px}
  .bar{width:100%;min-height:4px;border-radius:9px 9px 2px 2px;background:linear-gradient(180deg,#54d69d,#c4f7da);animation:grow .45s ease-out both}
  .bar.today{background:linear-gradient(180deg,var(--green),var(--green-deep))}
  .bar.empty{height:4px;background:rgba(236,250,242,.18);animation:none}
  .day{margin-top:10px;color:var(--muted);font-family:var(--mono);font-size:11px;letter-spacing:.4px}
  .day.today{color:#a7f3d0;font-weight:700}
  @keyframes grow{from{height:0}}

  .rowcard{display:flex;align-items:center;justify-content:space-between;gap:18px}
  .roundbtn{
    flex:none;
    width:58px;
    height:58px;
    border-radius:50%;
    color:#fff;
    background:linear-gradient(145deg,var(--blue),var(--green-dark));
    box-shadow:0 12px 30px rgba(5,90,155,.24);
    font-size:25px;
  }

  .sessionbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    margin-bottom:18px;
    border-radius:16px;
    padding:14px 16px;
    background:linear-gradient(145deg,var(--green-deep),#123a31);
    color:#eafff3;
    font-family:var(--mono);
    font-size:11px;
    letter-spacing:1.7px;
    text-transform:uppercase;
  }
  .sessionbar b{color:#fff;font-size:13px}
  .sep{margin:0 9px;color:#9ee8c8}

  .tabs{display:flex;gap:8px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
  .tabs::-webkit-scrollbar{display:none}
  .tab{
    flex:none;
    border-radius:999px;
    padding:10px 16px;
    background:rgba(236,250,242,.08);
    color:var(--muted);
    font-family:var(--mono);
    font-size:11px;
    letter-spacing:1.7px;
    text-transform:uppercase;
  }
  .tab.on{background:#dffbea;color:#07382c}
  .bank{display:grid;grid-template-columns:1fr;gap:9px}
  @media(min-width:600px){.bank{grid-template-columns:1fr 1fr}}
  .bank-item{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    min-height:64px;
    border:1px solid rgba(219,255,239,.16);
    border-radius:14px;
    padding:13px 14px;
    background:rgba(238,250,244,.92);
    color:#14201e;
    text-align:left;
    font-size:15.5px;
    transition:transform .16s ease,border-color .16s ease,box-shadow .16s ease;
  }
  .bank-item:hover{transform:translateY(-1px);border-color:rgba(5,150,105,.28);box-shadow:0 8px 18px rgba(6,78,59,.08)}
  .bank-item.added{background:#dffbea;border-color:rgba(186,243,210,.55);color:var(--green-deep)}
  .sub{display:block;margin-top:4px;color:#53615c;font-family:var(--mono);font-size:9.5px;letter-spacing:1.7px;text-transform:uppercase}
  .plus{
    display:flex;
    flex:none;
    width:34px;
    height:34px;
    align-items:center;
    justify-content:center;
    border:1px solid rgba(5,150,105,.16);
    border-radius:50%;
    background:var(--mint-soft);
    color:var(--green);
    font-family:var(--mono);
    font-size:18px;
  }
  .bank-item.added .plus{background:var(--green);color:#fff}

  .exbox{
    margin-bottom:14px;
    border:1px solid var(--line);
    border-radius:16px;
    padding:17px;
    background:linear-gradient(180deg,rgba(28,62,63,.86),rgba(16,45,44,.82));
  }
  .exhead{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:8px}
  .cattag{margin-top:5px;color:var(--green-dark);font-family:var(--mono);font-size:10px;letter-spacing:2px;text-transform:uppercase}
  .lastref{display:inline-block;margin:4px 0 14px;border-radius:10px;padding:8px 10px;background:rgba(223,251,234,.92);color:#17322d;font-family:var(--mono);font-size:11px}
  .bank-item.added .sub{color:#34524a}
  .setgrid{display:grid;grid-template-columns:28px minmax(0,1fr) minmax(0,1fr) 70px 24px;gap:8px;align-items:center;margin-bottom:8px}
  .setgrid.sec{grid-template-columns:28px minmax(0,1fr) 24px}
  .headrow{color:var(--faint);font-family:var(--mono);font-size:9.5px;letter-spacing:1.4px;text-transform:uppercase}
  .setnum{color:var(--faint);font-family:var(--mono);font-size:13px}
  input,select{
    width:100%;
    border:1px solid rgba(23,21,18,.13);
    border-radius:12px;
    padding:11px 12px;
    background:rgba(249,252,250,.94);
    color:#14201e;
    font-family:var(--mono);
    font-size:14px;
  }
  input:focus,select:focus{outline:0;border-color:var(--green);box-shadow:0 0 0 4px rgba(5,150,105,.12)}
  .setvol{text-align:right;color:#a7f3d0;font-family:var(--mono);font-size:12px}
  .rmset,.rmex{color:var(--faint);font-family:var(--mono);font-size:12px}
  .rmset{font-size:18px;text-align:right}
  .rmset:hover,.rmex:hover,.danger:hover{color:#dc2626}
  .linklike,.danger{padding:8px 0;color:var(--green-dark);font-family:var(--mono);font-size:11px;letter-spacing:1.7px;text-transform:uppercase}
  .danger{color:#dc2626}
  .empty-title{color:var(--faint);font-size:25px;letter-spacing:-.3px}

  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:0;text-align:center}
  .stats>div{padding:6px 10px}
  .stats>div+div{border-left:1px solid var(--line)}
  .n{font-size:clamp(30px,9vw,44px);line-height:1;letter-spacing:-1px}
  .l{margin-top:8px;color:var(--muted);font-family:var(--mono);font-size:10px;letter-spacing:1.9px;text-transform:uppercase}
  .balrow{margin-bottom:14px}
  .balhead{display:flex;justify-content:space-between;margin-bottom:7px;color:var(--muted);font-family:var(--mono);font-size:11px;letter-spacing:.8px}
  .track{height:12px;overflow:hidden;border-radius:999px;background:rgba(10,35,31,.12)}
  .fill{height:100%;border-radius:999px;transition:width .45s ease}
  .fill.push{background:linear-gradient(90deg,#b6b0a6,#8f8880)}
  .fill.pull{background:linear-gradient(90deg,#7ee7b9,var(--green))}
  .status{margin-top:18px;border:1px solid;border-radius:15px;padding:14px;color:#d8e7e1;background:rgba(12,35,37,.72);font-family:var(--mono);font-size:12.5px;line-height:1.55}
  .status.ok{border-color:rgba(186,243,210,.35);background:rgba(223,251,234,.9);color:var(--green-deep)}
  .note{margin-top:7px;color:var(--muted);font-size:11px}
  select{
    margin:16px 0;
    appearance:none;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path d='M1 1l5 5 5-5' fill='none' stroke='%23059669' stroke-width='2' stroke-linecap='round'/></svg>");
    background-repeat:no-repeat;
    background-position:right 16px center;
  }
  .axis{display:flex;justify-content:space-between;margin-top:6px;color:var(--muted);font-family:var(--mono);font-size:10px}

  .hcard{
    margin-bottom:14px;
    overflow:hidden;
    border:1px solid rgba(219,255,239,.14);
    border-radius:18px;
    background:rgba(20,49,52,.78);
    box-shadow:var(--shadow-soft);
  }
  .hbtn{display:block;width:100%;padding:19px 21px;text-align:left}
  .hrow2{display:flex;align-items:baseline;justify-content:space-between;gap:10px;margin-bottom:8px}
  .hdate{font-size:20px;text-transform:capitalize}
  .htime,.hexes,.hmeta{color:var(--muted);font-family:var(--mono);font-size:11px}
  .hexes{margin-bottom:12px;line-height:1.65}
  .hmeta{display:flex;gap:15px;letter-spacing:.4px}
  .hmeta .vol{color:#a7f3d0}
  .caret{margin-left:auto;color:var(--faint)}
  .hdetail{border-top:1px solid var(--line);padding:20px 21px;background:linear-gradient(180deg,rgba(15,42,43,.86),rgba(20,49,52,.9))}
  .hex-name{margin-bottom:8px;font-size:18px}
  .htable{width:100%;margin-bottom:20px;border-collapse:collapse}
  .htable th{border-bottom:1px solid rgba(5,150,105,.18);padding:5px 0;color:var(--faint);font-family:var(--mono);font-size:9.5px;letter-spacing:1.4px;text-align:left;text-transform:uppercase}
  .htable td{border-bottom:1px solid rgba(186,243,210,.08);padding:8px 0;color:#dbe9e3;font-family:var(--mono);font-size:13px}
  .r{text-align:right}

  nav{
    position:fixed;
    right:0;
    bottom:0;
    left:0;
    z-index:40;
    padding:18px 14px 14px;
    pointer-events:none;
    background:linear-gradient(180deg,rgba(8,23,35,0),rgba(8,23,35,.28) 36%,rgba(8,23,35,.42));
  }
  .navgrid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    width:min(100%,500px);
    margin:0 auto;
    gap:4px;
    border:1px solid rgba(255,255,255,.42);
    border-radius:999px;
    background:rgba(12,31,43,.58);
    box-shadow:0 20px 54px rgba(5,22,34,.34),inset 0 1px 0 rgba(255,255,255,.28);
    padding:6px;
    backdrop-filter:blur(20px) saturate(1.25);
    -webkit-backdrop-filter:blur(20px) saturate(1.25);
    pointer-events:auto;
  }
  .navbtn{
    min-height:54px;
    border-radius:999px;
    color:rgba(255,255,255,.62);
    font-family:var(--mono);
    font-size:10px;
    letter-spacing:1.3px;
    text-transform:uppercase;
    transition:background .16s ease,color .16s ease,box-shadow .16s ease,transform .16s ease;
  }
  .navbtn.on{
    background:linear-gradient(145deg,var(--green-deep),#07382c);
    color:#fff;
    font-weight:700;
    box-shadow:0 10px 24px rgba(0,0,0,.28),inset 0 1px 0 rgba(255,255,255,.16);
    transform:translateY(-1px);
  }

  .overlay{position:fixed;inset:0;z-index:50;display:none;align-items:flex-end;justify-content:center;padding:16px;background:rgba(11,26,38,.45);backdrop-filter:blur(4px)}
  .overlay.open{display:flex}
  @media(min-width:560px){.overlay{align-items:center}}
  .modal{width:min(100%,390px);border:1px solid var(--line);border-radius:24px;padding:26px;background:rgba(248,252,250,.96);box-shadow:0 30px 80px rgba(0,0,0,.28)}
  .modal .eyebrow{color:var(--green-dark)}
  .modal h2{color:#14201e}
  .beatcircle{display:flex;width:112px;height:112px;margin:22px auto 24px;align-items:center;justify-content:center;border:3px solid rgba(20,32,30,.18);border-radius:50%;transition:background .06s,border-color .06s,box-shadow .06s}
  .beatcircle.beat{border-color:var(--green);background:var(--mint-soft);box-shadow:0 0 0 9px rgba(5,150,105,.11)}
  .beatcircle span{color:#14201e;font-family:var(--mono);font-size:32px}
  input[type=range]{accent-color:var(--green);padding:0}
  .rangelabels{display:flex;justify-content:space-between;margin:8px 0 22px;color:#53615c;font-family:var(--mono);font-size:10px}

  #main>*{animation:rise .34s ease both}
  @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  @media(prefers-reduced-motion:reduce){*,*:before,*:after{animation:none!important;transition:none!important}}

  @media(max-width:520px){
    body{padding-bottom:104px}
    .wrap{width:min(100% - 24px,760px)}
    header{padding-top:28px}
    .card{padding:20px;border-radius:18px}
    .card.hero{padding:22px}
    .weektop{grid-template-columns:1fr}
    .weekbadge{text-align:left;width:100%;min-width:0}
    .btn-row{grid-template-columns:1fr;margin:18px 0}
    .chart{gap:6px;height:138px}
    .setgrid{grid-template-columns:24px minmax(0,1fr) minmax(0,1fr) 54px 20px;gap:6px}
    input{padding:10px 8px}
    nav{padding:16px 12px 12px}
    .navgrid{padding:5px;gap:3px}
    .navbtn{min-height:50px;font-size:9.5px;letter-spacing:.9px}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="hrow">
      <h1>Gym Buddy<span class="dot">.</span></h1>
      <span class="pill" id="savepill"></span>
    </div>
  </header>
  <main id="main"></main>
</div>

<nav>
  <div class="navgrid">
    <button class="navbtn" data-view="home">Hem</button>
    <button class="navbtn" data-view="workout">Pass</button>
    <button class="navbtn" data-view="analytics">Analys</button>
    <button class="navbtn" data-view="history">Historik</button>
  </div>
</nav>

<div class="overlay" id="metro-overlay">
  <div class="modal">
    <h2>Metronom</h2>
    <div class="beatcircle" id="beatcircle"><span id="bpmnum">100</span></div>
    <input type="range" id="bpmslider" min="40" max="220" value="100">
    <div class="rangelabels"><span>40</span><span>BPM</span><span>220</span></div>
    <div class="btn-row" style="margin-bottom:0">
      <button class="btn btn-primary" id="metro-toggle">Starta</button>
      <button class="btn btn-outline" id="metro-close">Stäng</button>
    </div>
  </div>
</div>

<script>
"use strict";

const EXERCISES=[
 {name:"Armhävningar",cat:"Push"},{name:"Axelpress i maskin",cat:"Push"},
 {name:"Bröstpress i maskin",cat:"Push"},{name:"Bänkpress",cat:"Push"},
 {name:"Hantelpress",cat:"Push"},{name:"Hantelpress över huvudet",cat:"Push"},
 {name:"Lutande bänkpress",cat:"Push"},{name:"Militärpress",cat:"Push"},
 {name:"Pec-dec",cat:"Push"},{name:"Sidolyft med hantlar",cat:"Push"},
 {name:"Triceps pushdowns",cat:"Push"},
 {name:"Bicepscurls med skivstång",cat:"Pull"},{name:"Chins",cat:"Pull"},
 {name:"Hammercurls",cat:"Pull"},{name:"Hantelcurls",cat:"Pull"},
 {name:"Latsdrag",cat:"Pull"},{name:"Omvända flyes",cat:"Pull"},
 {name:"Skivstångsrodd",cat:"Pull"},
 {name:"Benpress",cat:"Legs"},{name:"Benspark",cat:"Legs"},{name:"Knäböj",cat:"Legs"},
 {name:"Lårcurl",cat:"Legs"},{name:"Marklyft",cat:"Legs"},{name:"Utfall",cat:"Legs"},
 {name:"Vadpress",cat:"Legs"},
 {name:"Crunches",cat:"Core"},{name:"Magmaskin",cat:"Core"},
 {name:"Plankan",cat:"Core",seconds:true}
];
const EXMAP=Object.fromEntries(EXERCISES.map(e=>[e.name,e]));
const CATS=["Alla","Push","Pull","Legs","Core"];
const DAYS=["Mån","Tis","Ons","Tor","Fre","Lör","Sön"];
const KEY="styrka-data-v2";
const S={view:"home",workouts:[],active:null,catTab:"Alla",expanded:null,progressEx:""};

async function loadData(){
  try{const v=localStorage.getItem(KEY)||localStorage.getItem("styrka-data-v1");if(v)return JSON.parse(v)}catch(e){}
  return null;
}
let saveTimer=null;
function scheduleSave(){setPill("saving");clearTimeout(saveTimer);saveTimer=setTimeout(doSave,350)}
function doSave(){
  try{localStorage.setItem(KEY,JSON.stringify({workouts:S.workouts,active:S.active}));setPill("saved")}
  catch(e){setPill("error")}
}
function setPill(state){
  const p=document.getElementById("savepill");
  p.className="pill "+state;
  p.textContent=state==="saved"?"sparat":state==="saving"?"sparar...":"offline";
}

const num=v=>{const n=parseFloat(String(v).replace(",","."));return Number.isFinite(n)?n:0};
const setVol=(name,s)=>EXMAP[name]&&EXMAP[name].seconds?0:num(s.weight)*num(s.reps);
const exVol=e=>e.sets.reduce((a,s)=>a+setVol(e.name,s),0);
const wVol=w=>w.exercises.reduce((a,e)=>a+exVol(e),0);
const wSets=w=>w.exercises.reduce((a,e)=>a+e.sets.length,0);
const fmtKg=n=>n.toLocaleString("sv-SE",{maximumFractionDigits:0});
const fmtDate=iso=>new Date(iso).toLocaleDateString("sv-SE",{weekday:"short",day:"numeric",month:"short"});
const fmtTime=iso=>new Date(iso).toLocaleTimeString("sv-SE",{hour:"2-digit",minute:"2-digit"});
function monday(){const d=new Date();const sh=(d.getDay()+6)%7;const m=new Date(d);m.setDate(d.getDate()-sh);m.setHours(0,0,0,0);return m}
function lastUseMap(){
  const m={};
  [...S.workouts].sort((a,b)=>new Date(a.date)-new Date(b.date)).forEach(w=>w.exercises.forEach(e=>m[e.name]=w.date));
  return m;
}
function lastSetsFor(name){
  for(const w of [...S.workouts].sort((a,b)=>new Date(b.date)-new Date(a.date))){
    const e=w.exercises.find(x=>x.name===name);
    if(e&&e.sets.length)return {date:w.date,sets:e.sets};
  }
  return null;
}

function renderHome(){
  const mon=monday(),days=Array(7).fill(0);
  let weekPass=0,weekSets=0;
  S.workouts.forEach(w=>{
    const diff=Math.floor((new Date(w.date)-mon)/86400000);
    if(diff>=0&&diff<7){days[diff]+=wVol(w);weekPass++;weekSets+=wSets(w)}
  });
  const total=days.reduce((a,b)=>a+b,0),maxD=Math.max(...days,1),today=(new Date().getDay()+6)%7;
  const bars=days.map((v,i)=>{
    const h=v>0?Math.max(v/maxD*100,9):0;
    return `<div class="col"><div class="val">${v?fmtKg(v):""}</div><div class="bar ${v?(i===today?"today":""):"empty"}" style="height:${v?h:4}%"></div><div class="day ${i===today?"today":""}">${DAYS[i]}</div></div>`;
  }).join("");
  return `
    <section class="card hero">
      <div class="eyebrow">Träning · denna vecka</div>
      <div class="weektop">
        <div><span class="weeknum">${fmtKg(total)}</span><span class="weeklabel">kg lyft</span></div>
        <div class="weekbadge"><b>${weekPass}</b><span>pass · ${weekSets} set</span></div>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" data-action="start">${S.active?"Fortsätt pass":"Logga nytt pass"}</button>
        <button class="btn btn-outline" data-action="goto-history">Visa historik</button>
      </div>
      <div class="chart">${bars}</div>
    </section>
    <section class="card blue rowcard">
      <div>
        <div class="eyebrow" style="margin-bottom:9px">Tempo</div>
        <h3>Metronom för övningsstunden</h3>
      </div>
      <button class="roundbtn" data-action="metronome" aria-label="Öppna metronom">♩</button>
    </section>`;
}

function renderWorkout(){
  const lu=lastUseMap();
  let activeHtml;
  if(!S.active||S.active.exercises.length===0){
    activeHtml=`<p class="empty-title">${S.active?"Passet är tomt. Lägg till övningar nedan.":"Inget aktivt pass"}</p>`;
  }else{
    const boxes=S.active.exercises.map((ex,xi)=>{
      const isSec=EXMAP[ex.name]&&EXMAP[ex.name].seconds;
      const prev=lastSetsFor(ex.name);
      const prevTxt=prev?`<div class="lastref">Senast (${fmtDate(prev.date)}): ${prev.sets.map(s=>isSec?num(s.reps)+" sek":num(s.weight)+"×"+num(s.reps)).join(" · ")}</div>`:"";
      const rows=ex.sets.map((s,i)=>isSec?`
        <div class="setgrid sec">
          <div class="setnum">${i+1}</div>
          <input type="number" inputmode="numeric" placeholder="0" value="${s.reps}" data-exi="${xi}" data-idx="${i}" data-field="reps">
          <button class="rmset" data-action="rm-set" data-exi="${xi}" data-idx="${i}">×</button>
        </div>`:`
        <div class="setgrid">
          <div class="setnum">${i+1}</div>
          <input type="number" inputmode="decimal" placeholder="0" value="${s.weight}" data-exi="${xi}" data-idx="${i}" data-field="weight">
          <input type="number" inputmode="numeric" placeholder="0" value="${s.reps}" data-exi="${xi}" data-idx="${i}" data-field="reps">
          <div class="setvol" id="vol-${xi}-${i}">${fmtKg(setVol(ex.name,s))}</div>
          <button class="rmset" data-action="rm-set" data-exi="${xi}" data-idx="${i}">×</button>
        </div>`).join("");
      return `<div class="exbox">
        <div class="exhead">
          <div><h3>${ex.name}</h3><div class="cattag">${EXMAP[ex.name].cat.toUpperCase()}${isSec?" · sekunder":""}</div></div>
          <button class="rmex" data-action="rm-ex" data-exi="${xi}">Ta bort</button>
        </div>
        ${prevTxt}
        ${isSec?'<div class="setgrid sec headrow"><div>Set</div><div>Sekunder</div><div></div></div>':'<div class="setgrid headrow"><div>Set</div><div>Vikt kg</div><div>Reps</div><div class="r">Volym</div><div></div></div>'}
        ${rows}
        <button class="linklike" data-action="add-set" data-exi="${xi}">+ Nytt set</button>
      </div>`;
    }).join("");
    const sesVol=S.active.exercises.reduce((a,e)=>a+exVol(e),0),sesSets=S.active.exercises.reduce((a,e)=>a+e.sets.length,0);
    activeHtml=`<div class="sessionbar"><span>Denna session</span><span><b id="session-vol">${fmtKg(sesVol)} kg</b><span class="sep">·</span><span id="session-sets">${sesSets} set</span></span></div>${boxes}
      <div class="btn-row" style="margin-bottom:0"><button class="btn btn-primary" data-action="finish">Avsluta &amp; spara</button><button class="btn btn-outline" data-action="cancel">Avbryt</button></div>`;
  }
  const tabs=CATS.map(c=>`<button class="tab ${S.catTab===c?"on":""}" data-action="cat" data-cat="${c}">${c}</button>`).join("");
  const list=EXERCISES.filter(e=>S.catTab==="Alla"||e.cat===S.catTab).sort((a,b)=>{
    const la=lu[a.name],lb=lu[b.name];
    if(la&&lb)return new Date(lb)-new Date(la);
    if(la)return -1;if(lb)return 1;
    return a.name.localeCompare(b.name,"sv");
  });
  const bank=list.map(e=>{
    const added=S.active&&S.active.exercises.some(x=>x.name===e.name);
    return `<button class="bank-item ${added?"added":""}" data-action="add-ex" data-name="${e.name}">
      <span>${e.name}<span class="sub">${e.cat.toUpperCase()}${lu[e.name]?" · "+fmtDate(lu[e.name]):""}</span></span>
      <span class="plus">${added?"✓":"+"}</span>
    </button>`;
  }).join("");
  return `<section class="card"><div class="eyebrow">Aktivt pass</div>${activeHtml}</section>
    <section class="card"><div class="eyebrow">Övningsbank</div><div class="tabs">${tabs}</div><p class="mono small faint" style="margin-bottom:13px">Senast använda ligger överst. Övriga sorteras alfabetiskt.</p><div class="bank">${bank}</div></section>`;
}

function renderAnalytics(){
  const names=new Set();let vol=0,push=0,pull=0;
  S.workouts.forEach(w=>{w.exercises.forEach(e=>{names.add(e.name);const v=exVol(e),c=EXMAP[e.name]&&EXMAP[e.name].cat;if(c==="Push")push+=v;if(c==="Pull")pull+=v});vol+=wVol(w)});
  const diff=Math.abs(pull-push),total=push+pull||1;
  const pullRatio=push>0?pull/push:(pull>0?Infinity:0);
  let balanceClass="",balanceText="Ingen push/pull-data än.";
  if(push+pull>0){
    if(push===0&&pull>0){
      balanceClass="ok";
      balanceText=`Bra dragfokus · du har ${fmtKg(pull)} kg dragvolym och ingen pressvolym än.`;
    }else if(pullRatio>=.9&&pull<=push){
      balanceClass="ok";
      balanceText="Balansen ser bra ut · drag och press ligger ungefär i nivå.";
    }else if(pull>push){
      balanceClass="ok";
      balanceText=`Balansen ser bra ut · drag ligger ${fmtKg(diff)} kg över press.`;
    }else{
      balanceText=`Håll koll på balansen · press ligger ${fmtKg(diff)} kg över drag.`;
    }
  }
  const lu=lastUseMap(),used=EXERCISES.filter(e=>lu[e.name]).map(e=>e.name);
  if(!S.progressEx&&used.length)S.progressEx=used[0];
  const opts=used.map(n=>`<option value="${n}" ${S.progressEx===n?"selected":""}>${n}</option>`).join("");
  let chart="";
  if(S.progressEx){
    const isSec=EXMAP[S.progressEx]&&EXMAP[S.progressEx].seconds;
    const pts=[...S.workouts].sort((a,b)=>new Date(a.date)-new Date(b.date)).map(w=>{
      const e=w.exercises.find(x=>x.name===S.progressEx);if(!e)return null;
      return {date:w.date,value:isSec?Math.max(...e.sets.map(s=>num(s.reps)),0):Math.max(...e.sets.map(s=>num(s.weight)),0)};
    }).filter(p=>p&&p.value>0);
    if(pts.length){
      const W=320,H=132,pad=16,vals=pts.map(p=>p.value),mx=Math.max(...vals),mn=Math.min(...vals),span=mx-mn||1;
      const x=i=>pts.length===1?W/2:pad+i/(pts.length-1)*(W-pad*2);
      const y=v=>H-pad-(v-mn)/span*(H-pad*2);
      chart=`<p class="mono small">${isSec?"Längsta set per pass":"Tyngsta set per pass"}</p>
        <svg viewBox="0 0 ${W} ${H}" style="width:100%;display:block;margin-top:8px">
          <polyline points="${pts.map((p,i)=>x(i)+","+y(p.value)).join(" ")}" fill="none" stroke="#059669" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
          ${pts.map((p,i)=>`<circle cx="${x(i)}" cy="${y(p.value)}" r="4" fill="#059669"/>`).join("")}
        </svg>
        <div class="axis"><span>${fmtDate(pts[0].date)}</span><span style="color:var(--green-dark)">max ${fmtKg(mx)} ${isSec?"sek":"kg"}</span><span>${fmtDate(pts[pts.length-1].date)}</span></div>`;
    }else chart=`<p class="mono small faint">Ingen data för vald övning än.</p>`;
  }
  return `<section class="card hero"><div class="eyebrow">Livstidsstatistik</div><div class="stats">
      <div><div class="n">${S.workouts.length}</div><div class="l">Pass</div></div>
      <div><div class="n">${names.size}</div><div class="l">Övningar</div></div>
      <div><div class="n">${fmtKg(vol)}</div><div class="l">Kg totalt</div></div>
    </div></section>
    <section class="card"><div class="eyebrow">Balans · Push vs Pull</div>
      <p class="mono small" style="margin-bottom:16px">Riktmärke: dragvolymen bör ligga ungefär i nivå med pressvolymen eller lite högre. Det är en enkel påminnelse, inte en absolut regel.</p>
      <div class="balrow"><div class="balhead"><span>PUSH · ${Math.round(push/total*100)}%</span><span>${fmtKg(push)} kg</span></div><div class="track"><div class="fill push" style="width:${push/total*100}%"></div></div></div>
      <div class="balrow"><div class="balhead"><span>PULL · ${Math.round(pull/total*100)}%</span><span>${fmtKg(pull)} kg</span></div><div class="track"><div class="fill pull" style="width:${pull/total*100}%"></div></div></div>
      <div class="status ${balanceClass}">${balanceText}<div class="note">Ben och core räknas inte in i kvoten.</div></div>
    </section>
    <section class="card blue"><div class="eyebrow">Utveckling</div><h2>Kurva per övning</h2>
      ${used.length?`<select id="progress-select"><option value="">Välj övning...</option>${opts}</select>${chart}`:`<p class="mono small faint" style="margin-top:12px">Logga första passet så dyker kurvorna upp här.</p>`}
    </section>`;
}

function renderHistory(){
  if(!S.workouts.length)return `<section class="card"><p class="empty-title" style="margin-bottom:7px">Tom historik</p><p class="mono small">Ditt första loggade pass hamnar här.</p></section>`;
  return S.workouts.map(w=>{
    const open=S.expanded===w.id;
    const detail=open?`<div class="hdetail">${w.exercises.map(ex=>{
      const isSec=EXMAP[ex.name]&&EXMAP[ex.name].seconds;
      const rows=ex.sets.map((s,i)=>isSec?`<tr><td>${i+1}</td><td class="r">${num(s.reps)} sek</td></tr>`:`<tr><td>${i+1}</td><td>${num(s.reps)}</td><td>${num(s.weight)} kg</td><td class="r">${fmtKg(setVol(ex.name,s))} kg</td></tr>`).join("");
      return `<div class="hex-name">${ex.name}</div><table class="htable">${isSec?'<tr><th>Set</th><th class="r">Tid</th></tr>':'<tr><th>Set</th><th>Reps</th><th>Vikt</th><th class="r">Volym</th></tr>'}${rows}</table>`;
    }).join("")}<button class="danger" data-action="del" data-id="${w.id}">Radera pass</button></div>`:"";
    return `<article class="hcard"><button class="hbtn" data-action="toggle" data-id="${w.id}">
      <div class="hrow2"><span class="hdate">${fmtDate(w.date)}</span><span class="htime">kl ${fmtTime(w.startedAt||w.date)}</span></div>
      <div class="hexes">${w.exercises.map(e=>e.name).join(" · ")}</div>
      <div class="hmeta"><span class="vol">${fmtKg(wVol(w))} kg</span><span>${wSets(w)} set</span><span>${w.exercises.length} övningar</span><span class="caret">${open?"▲":"▼"}</span></div>
    </button>${detail}</article>`;
  }).join("");
}

function render(){
  const main=document.getElementById("main");
  main.innerHTML=S.view==="home"?renderHome():S.view==="workout"?renderWorkout():S.view==="analytics"?renderAnalytics():renderHistory();
  document.querySelectorAll(".navbtn").forEach(b=>b.classList.toggle("on",b.dataset.view===S.view));
  const activeTab=document.querySelector(".tabs .tab.on");
  if(activeTab)activeTab.scrollIntoView({block:"nearest",inline:"center"});
  const sel=document.getElementById("progress-select");
  if(sel)sel.addEventListener("change",e=>{S.progressEx=e.target.value;render()});
}

document.querySelector("nav").addEventListener("click",e=>{
  const b=e.target.closest(".navbtn");if(!b)return;
  S.view=b.dataset.view;render();window.scrollTo(0,0);
});

document.getElementById("main").addEventListener("click",e=>{
  const b=e.target.closest("[data-action]");if(!b)return;
  const a=b.dataset.action;
  if(a==="start"){if(!S.active)S.active={startedAt:new Date().toISOString(),exercises:[]};S.view="workout";scheduleSave();render();window.scrollTo(0,0)}
  else if(a==="goto-history"){S.view="history";render();window.scrollTo(0,0)}
  else if(a==="metronome")openMetronome();
  else if(a==="cat"){S.catTab=b.dataset.cat;render()}
  else if(a==="add-ex"){
    const name=b.dataset.name;
    if(!S.active)S.active={startedAt:new Date().toISOString(),exercises:[]};
    if(!S.active.exercises.some(x=>x.name===name)){S.active.exercises.push({name,sets:[{reps:"",weight:""}]});scheduleSave();render()}
  }
  else if(a==="rm-ex"){S.active.exercises.splice(+b.dataset.exi,1);scheduleSave();render()}
  else if(a==="add-set"){
    const ex=S.active.exercises[+b.dataset.exi],last=ex.sets[ex.sets.length-1]||{reps:"",weight:""};
    ex.sets.push({reps:last.reps,weight:last.weight});scheduleSave();render();
  }
  else if(a==="rm-set"){S.active.exercises[+b.dataset.exi].sets.splice(+b.dataset.idx,1);scheduleSave();render()}
  else if(a==="finish")finishWorkout();
  else if(a==="cancel"){S.active=null;scheduleSave();render()}
  else if(a==="toggle"){const id=+b.dataset.id;S.expanded=S.expanded===id?null:id;render()}
  else if(a==="del"){S.workouts=S.workouts.filter(w=>w.id!==+b.dataset.id);S.expanded=null;scheduleSave();render()}
});

document.getElementById("main").addEventListener("input",e=>{
  const inp=e.target;if(!inp.dataset||!inp.dataset.field)return;
  const ex=S.active.exercises[+inp.dataset.exi];
  ex.sets[+inp.dataset.idx][inp.dataset.field]=inp.value;
  const cell=document.getElementById(`vol-${inp.dataset.exi}-${inp.dataset.idx}`);
  if(cell)cell.textContent=fmtKg(setVol(ex.name,ex.sets[+inp.dataset.idx]));
  const sv=document.getElementById("session-vol");
  if(sv)sv.textContent=fmtKg(S.active.exercises.reduce((a,e2)=>a+exVol(e2),0))+" kg";
  scheduleSave();
});

function finishWorkout(){
  if(!S.active)return;
  const cleaned=S.active.exercises.map(e=>({name:e.name,sets:e.sets.filter(s=>num(s.reps)>0||num(s.weight)>0)})).filter(e=>e.sets.length);
  if(!cleaned.length){S.active=null;S.view="home";scheduleSave();render();return}
  const w={id:Date.now(),date:new Date().toISOString(),startedAt:S.active.startedAt,exercises:cleaned};
  S.workouts.unshift(w);S.active=null;S.view="history";S.expanded=w.id;S.progressEx="";
  scheduleSave();render();window.scrollTo(0,0);
}

let audioCtx=null,metroTimer=null,metroRunning=false,bpm=100;
function tick(){
  try{
    if(!audioCtx)audioCtx=new (window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state==="suspended")audioCtx.resume();
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.frequency.value=1000;
    g.gain.setValueAtTime(.38,audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+.06);
    o.connect(g).connect(audioCtx.destination);
    o.start();o.stop(audioCtx.currentTime+.07);
  }catch(e){}
  const c=document.getElementById("beatcircle");
  c.classList.add("beat");setTimeout(()=>c.classList.remove("beat"),90);
}
function startMetro(){
  metroRunning=true;
  const t=document.getElementById("metro-toggle");
  t.textContent="Stopp";t.classList.replace("btn-primary","btn-dark");
  tick();metroTimer=setInterval(tick,60000/bpm);
}
function stopMetro(){
  metroRunning=false;clearInterval(metroTimer);
  const t=document.getElementById("metro-toggle");
  t.textContent="Starta";t.classList.replace("btn-dark","btn-primary");
}
function openMetronome(){document.getElementById("metro-overlay").classList.add("open")}
document.getElementById("metro-toggle").addEventListener("click",()=>metroRunning?stopMetro():startMetro());
document.getElementById("metro-close").addEventListener("click",()=>{stopMetro();document.getElementById("metro-overlay").classList.remove("open")});
document.getElementById("bpmslider").addEventListener("input",e=>{
  bpm=+e.target.value;document.getElementById("bpmnum").textContent=bpm;
  if(metroRunning){clearInterval(metroTimer);metroTimer=setInterval(tick,60000/bpm)}
});

(async()=>{
  const d=await loadData();
  if(d){S.workouts=d.workouts||[];S.active=d.active||null}
  render();
})();
</script>
</body>
